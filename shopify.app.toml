# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "be493f3208915e4b593501309862ba4a"
name = "Loyalify App"
application_url = "https://loyalifyapp.onrender.com"
embedded = true


[build]
automatically_update_urls_on_dev = true
 
[webhooks]
api_version = "2026-07"
 
  [[webhooks.subscriptions]]
  topics = ["orders/paid"]
  uri    = "/webhooks/orders-paid"
 
  [[webhooks.subscriptions]]
  topics = ["orders/fulfilled"]
  uri    = "/webhooks/orders-fulfilled"
 
  [[webhooks.subscriptions]]
  topics = ["orders/cancelled"]
  uri    = "/webhooks/orders-cancelled"
 
 [[webhooks.subscriptions]]
compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
uri = "https://app.example.com/webhooks"

[access_scopes]
# Minimal scopes — only what the app actually uses
# write_customers: sync loyalty.points + loyalty.tier metafields
# read_customers:  look up customers
# write_orders:    not used directly but required for order webhook context
# read_orders:     read order data in webhooks
# write_content:   create Loyalty Rewards page on install
# write_discounts: create discount codes for point redemption
scopes = "write_customers,read_customers,read_orders,write_content,write_discounts"
 
[auth]
redirect_urls = [ "https://loyalifyapp.onrender.com/api/auth" ]
